<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSign Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b10;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:40px;
}

.card{
    background:#17171f;
    border-radius:24px;
    padding:20px;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.left{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo{
    width:80px;
    height:80px;
    border-radius:20px;
    object-fit:cover;
}

.title{
    font-size:32px;
    font-weight:700;
}

.cert{
    font-size:18px;
    color:#9f9f9f;
    margin-top:5px;
}

.install{
    background:#007AFF;
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:999px;
    font-weight:700;
    font-size:18px;
}

.install:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>KSign Store</h1>
</div>

<div class="card">

<div class="left">
<img src="IMG_0274.png" class="logo" alt="KSign">

<div>
<div class="title">KSign</div>
<div class="cert">BOC</div>
</div>
</div>

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/arianyt03/KSign/main/KSignBOC.plist">
INSTALL
</a>

</div>

<div class="card">

<div class="left">
<img src="IMG_0274.png" class="logo" alt="KSign">

<div>
<div class="title">KSign</div>
<div class="cert">Commission on Electronics</div>
</div>
</div>

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/arianyt03/KSign/main/KSignComission.plist">
INSTALL
</a>

</div>

</div>

</body>
</html>
