<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESign</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b10;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:40px;
}

.card{
    background:#17171f;
    border-radius:24px;
    padding:20px;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.left{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo{
    width:80px;
    height:80px;
    border-radius:20px;
    object-fit:cover;
}

.title{
    font-size:32px;
    font-weight:700;
}

.cert{
    font-size:18px;
    color:#9f9f9f;
    margin-top:5px;
}

.buttons{
    display:flex;
    gap:10px;
}

.install,
.certbtn{
    color:white;
    text-decoration:none;
    padding:14px 24px;
    border-radius:999px;
    font-weight:700;
    font-size:18px;
}

.install{
    background:#007AFF;
}

.certbtn{
    background:#444;
}

.install:hover,
.certbtn:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>ESign</h1>
</div>

<!-- DNS Profile -->

<div class="card">
<div class="left">
<img src="IMG_0091-removebg-preview.png" class="logo" alt="DNS">
<div>
<div class="title">DNS Profile</div>
<div class="cert">Required For Installation</div>
</div>
</div>

<div class="buttons">
<a class="install"
href="https://github.com/dns-khoindvn/oci-auto-vm/releases/download/DNS/khoindvn.mobileconfig"
target="_blank">
INSTALL
</a>
</div>
</div>


<!-- Vietnam Airlines ESign -->

<div class="card">
<div class="left">
<img src="IMG_0093.png" class="logo" alt="ESign">
<div>
<div class="title">ESign</div>
<div class="cert">Vietnam Airlines JSC</div>
</div>
</div>

<div class="buttons">

<a class="install"
href="https://loot-link.com/s?hz7M5kUM">
INSTALL
</a>

<a class="certbtn"
href="https://cdn.discordapp.com/attachments/1377780935633670154/1517169671584088226/VIETNAM_AIRLINES_JSC.zip?ex=6a354ddd&is=6a33fc5d&hm=f4df7e1f0f9f87365fd6024ade4d5e12ec456e5038d1291f70bf0018c10651ae&"
target="_blank">
CERTIFICATE
</a>

</div>
</div>


<!-- Commission on Electronics -->

<div class="left">
<img src="IMG_0274.png" class="logo" alt="KSign">
<div>
<div class="title">KSign</div>
<div class="cert">Commission on Electronics</div>
</div>
</div>

<div class="buttons">

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/ppotato2026/KSign/main/KSignComission.plist">
INSTALL
</a>

<a class="certbtn"
href="https://cdn.discordapp.com/attachments/1377780935633670154/1451655100438282482/Commission_on_Elections.zip"
target="_blank">
CERTIFICATE
</a>

</div>
</div>


<!-- China Academy -->

<div class="card">
<div class="left">
<img src="IMG_0274.png" class="logo" alt="KSign">
<div>
<div class="title">KSign</div>
<div class="cert">China Academy</div>
</div>
</div>

<div class="buttons">

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/ppotato2026/KSign/main/KSignAcademy.plist">

</a>

<a class="certbtn"
href="https://cdn.discordapp.com/attachments/1377780935633670154/1466426509333102830/China_Academy_of_Railway_Sciences.zip"
target="_blank">
CERTIFICATE
</a>

</div>
</div>


<!-- Global Takeoff -->

<div class="left">
<img src="IMG_0274.png" class="logo" alt="KSign">
<div>
<div class="title">KSign</div>
<div class="cert">Global Takeoff</div>
</div>
</div>

<div class="buttons">

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/ppotato2026/KSign/main/KSignGlobal.plist">

</a>

<a class="certbtn"
href="https://cdn.discordapp.com/attachments/1377780935633670154/1405950184168624238/GLOBALTAKEOFFINC.zip"
target="_blank">
CERTIFICATE
</a>

</div>
</div>


<!-- Beijing Xibel -->

<div class="card">
<div class="left">
<img src="IMG_0274.png" class="logo" alt="KSign">
<div>
<div class="title">KSign</div>
<div class="cert">Beijing Xibel</div>
</div>
</div>

<div class="buttons">

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/ppotato2026/KSign/main/KSignXibel.plist">
INSTALL
</a>

<a class="certbtn"
href="https://raw.githubusercontent.com/royilkom-alt/cert/refs/heads/main/Xibei.zip"
target="_blank">
CERTIFICATE
</a>

</div>
</div>

</div>

</body>
</html>
