<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Install KSign </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b10;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:38px;
}

.card{
    background:#17171f;
    border-radius:28px;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.left{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo{
    width:90px;
    height:90px;
    border-radius:22px;
    object-fit:cover;
}

.title{
    font-size:32px;
    font-weight:700;
}

.cert{
    color:#a0a0b0;
    margin-top:6px;
    font-size:18px;
}

.install{
    background:#007AFF;
    color:white;
    text-decoration:none;
    padding:14px 30px;
    border-radius:999px;
    font-weight:700;
    font-size:18px;
    min-width:140px;
    text-align:center;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>KSign</h1>
</div>

<!-- BOC -->

<div class="card">

<div class="left">

<img class="logo" src="IMG_0274.png" alt="KSign">

<div>
<div class="title">KSign</div>
<div class="cert">BOC</div>
</div>

</div>

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/arianyt03/KSign/main/KSignBOC.plist">
INSTALL
</a>

</div>

<!-- Commission on Electronics -->

<div class="card">

<div class="left">

<img class="logo" src="IMG_0274.png" alt="KSign">

<div>
<div class="title">KSign</div>
<div class="cert">Commission on Electronics</div>
</div>

</div>

<a class="install"
href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/arianyt03/KSign/main/KSignComission.plist">
INSTALL
</a>

</div>

</div>

</body>
</html>
